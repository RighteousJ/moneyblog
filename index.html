<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miseek: 한국의 미식 정보 블로그</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">
            <a href="#"><img src="logo.png" alt="Miseek Logo"></a>
        </div>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li class="dropdown">
                    <a href="#">Categories</a>
                    <ul class="dropdown-menu">
                        <li><a href="#">한식 (Korean)</a></li>
                        <li><a href="#">일식 (Japanese)</a></li>
                        <li><a href="#">중식 (Chinese)</a></li>
                        <li><a href="#">양식 (Western)</a></li>
                        <li><a href="#">기타 (Etc.)</a></li>
                    </ul>
                </li>
                <li><a href="#">About</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>
        <div class="header-actions">
            <!-- Future icons or buttons can go here -->
        </div>
    </header>
    <div class="container">
        <main>
            <article>
                <h2>블로그에 오신 것을 환영합니다!</h2>
                <p>이곳에서 한국의 다양한 미식 정보를 탐험하고 공유하세요.</p>
            </article>
        </main>
        <aside>
            <h3>About Miseek</h3>
            <p>Miseek은 최고의 한국 미식 경험을 나누기 위한 공간입니다.</p>
        </aside>
    </div>

    <!-- Post Creation Modal -->
    <div id="post-modal" class="modal">
        <div class="modal-content">
            <span class="close-button">&times;</span>
            <h2>새로운 미식 포스트 작성</h2>
            <form id="post-form">
                <input type="text" id="post-title" placeholder="제목을 입력하세요" required>
                <textarea id="post-content" placeholder="어떤 맛있는 이야기를 공유하고 싶으신가요?" rows="10" required></textarea>
                <button type="submit">게시하기</button>
            </form>
        </div>
    </div>

    <button class="fab">+</button>
    <footer>
        <p>&copy; 2024 Miseek</p>
    </footer>
    <script src="main.js"></script>
</body>
</html>
